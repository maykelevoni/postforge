services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: false

  # Local-only Postgres — used when DATABASE_URL points to localhost.
  # Not started in production (use Neon or another managed DB there).
  # Start with: docker compose --profile local up
  db:
    image: postgres:16-alpine
    profiles: [local]
    environment:
      POSTGRES_USER: postforge
      POSTGRES_PASSWORD: postforge
      POSTGRES_DB: postforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
